<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/logo-192.png">
    <title>Agenda</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/nav.js"></script>
    <script src="/codemirror-bundle.js"></script>
    <script src="task-editor.js"></script>
    <script src="task-card.js"></script>
    <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
</head>
<body class="list-page">
<div class="list-layout">
    <div class="list-sidebar list-proj-sidebar" id="tw-proj-sidebar"></div>
    <div class="container">
        <div class="tasks-section">
            <div class="list-header">
                <h2 id="tasks-heading">Agenda</h2>
                <div class="list-header-right">
                    <span id="filter-badge" class="filter-badge"></span>
                    <button id="view-card" class="view-btn active" title="Card view">⊞</button>
                    <button id="view-list" class="view-btn"        title="List view">≡</button>
                </div>
            </div>
            <div id="loading" class="loading">Loading agenda...</div>
            <div id="error-message" class="error-message" style="display:none"></div>
            <div id="tasks-container"></div>
        </div>
    </div>
    <div class="list-sidebar list-tags-sidebar" id="tw-tags-sidebar"></div>
</div>

    <div id="notification" class="notification">
        <span id="notif-text"></span>
        <button class="notif-close" id="notif-close">×</button>
    </div>

    <script src="agenda.js"></script>
</body>
</html>
