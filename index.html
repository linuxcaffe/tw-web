<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/logo-192.png">
    <title>tw-web</title>
    <link rel="stylesheet" href="styles.css">
    <script src="nav.js"></script>
    <script src="/codemirror-bundle.js"></script>
    <script src="task-editor.js"></script>
    <script src="task-card.js"></script>
    <script src="main.js"></script>
    <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
</head>
<body>
    <div class="container">
        <div class="tasks-section">
            <div class="list-header">
                <h2 id="tasks-heading">Tasks</h2>
                <div class="list-header-right">
                    <span id="filter-badge" class="filter-badge"></span>
                    <div class="sort-wrap">
                        <button id="sort-btn" class="view-btn" title="Sort">⇅</button>
                        <div id="sort-popup" class="sort-popup" style="display:none">
                            <div class="sort-fields" id="sort-fields"></div>
                            <label class="sort-reverse-label">
                                <input type="checkbox" id="sort-reverse"> Reverse
                            </label>
                        </div>
                    </div>
                    <button id="view-card" class="view-btn active" title="Card view">⊞</button>
                    <button id="view-list" class="view-btn"        title="List view">≡</button>
                </div>
            </div>
            <div id="loading" class="loading">Loading tasks...</div>
            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="tasks-container"></div>
        </div>
    </div>

    <!-- Le modal d'édition sera créé dynamiquement par TaskEditor -->

<div id="notification" class="notification">
        <span id="notif-text"></span>
        <button class="notif-close" id="notif-close">×</button>
    </div>

</body>
</html>
