<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tw-web</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 320px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    padding: 12px;
  }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab {
    flex: 1; padding: 5px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; background: transparent; color: rgba(255,255,255,0.45);
    cursor: pointer; font-size: 12px; font-weight: 500;
  }
  .tab.active { background: #3498db; border-color: #3498db; color: #fff; }
  .pane { display: none; }
  .pane.active { display: block; }
  .url-preview {
    font-size: 11px; color: rgba(255,255,255,0.35);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 10px; padding: 4px 6px;
    background: rgba(255,255,255,0.05); border-radius: 4px;
  }
  label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
  input, select {
    width: 100%; padding: 6px 8px; margin-bottom: 8px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; color: #e0e0e0; font-size: 13px; outline: none;
  }
  input:focus, select:focus { border-color: #5dade2; }
  select option { background: #1a1a2e; }
  .row { display: flex; gap: 8px; }
  .row > div { flex: 1; }
  .actions { display: flex; gap: 8px; margin-top: 4px; }
  button.primary {
    flex: 1; padding: 7px; border: none; border-radius: 5px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: #3498db; color: #fff;
  }
  button.primary:hover { background: #2980b9; }
  button.primary:disabled { background: #555; color: #888; cursor: default; }
  #status, #status2 {
    margin-top: 8px; padding: 6px 8px; border-radius: 4px;
    font-size: 12px; display: none;
  }
  .ok  { background: rgba(39,174,96,0.2);  color: #2ecc71; display: block !important; }
  .err { background: rgba(192,57,43,0.2);  color: #e74c3c; display: block !important; }

  /* tw-web pane */
  .tw-status-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 6px; margin-bottom: 10px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    background: #555; transition: background 0.3s;
  }
  .status-dot.online  { background: #2ecc71; }
  .status-dot.offline { background: #e74c3c; }
  .status-label { font-size: 12px; color: rgba(255,255,255,0.6); flex: 1; }
  #btn-stop-start {
    padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15); background: transparent;
    color: rgba(255,255,255,0.5); flex-shrink: 0;
  }
  #btn-stop-start:hover { background: rgba(255,255,255,0.1); color: #fff; }
  #btn-stop-start.stop  { border-color: rgba(231,76,60,0.5); color: #e74c3c; }
  #btn-stop-start.stop:hover { background: rgba(231,76,60,0.15); }
  #stop-confirm {
    display: none; padding: 8px 10px; border-radius: 6px; margin-bottom: 10px;
    background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3);
    font-size: 12px; color: #e74c3c;
  }
  #stop-confirm.show { display: flex; align-items: center; gap: 8px; }
  #stop-confirm span { flex: 1; }
  #stop-confirm button { padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; border: none; }
  #btn-stop-yes { background: #e74c3c; color: #fff; }
  #btn-stop-no  { background: rgba(255,255,255,0.1); color: #ccc; }
  .tw-links { display: flex; flex-direction: column; gap: 6px; }
  .tw-links button, .tw-links a {
    display: block; padding: 7px 10px; border-radius: 5px;
    font-size: 13px; text-decoration: none; text-align: left;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #e0e0e0; cursor: pointer; width: 100%;
  }
  .tw-links button:hover, .tw-links a:hover {
    background: rgba(255,255,255,0.12); color: #fff;
  }
  #btn-open {
    background: rgba(52,152,219,0.15) !important;
    border-color: rgba(52,152,219,0.4) !important; color: #5dade2 !important;
  }
  #btn-open:hover { background: rgba(52,152,219,0.28) !important; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" data-pane="pane-add">Add task</button>
  <button class="tab"        data-pane="pane-bookmark">Bookmark</button>
  <button class="tab"        data-pane="pane-twweb">tw-web</button>
</div>

<!-- ── Add task pane ── -->
<div class="pane active" id="pane-add">
  <label for="add-desc">Description</label>
  <input id="add-desc" type="text" autocomplete="off" placeholder="What needs doing?" autofocus>

  <div class="row">
    <div>
      <label for="add-project">Project</label>
      <input id="add-project" type="text" autocomplete="off" placeholder="optional">
    </div>
    <div>
      <label for="add-pri">Priority</label>
      <select id="add-pri">
        <option value="">—</option>
        <option value="H">H</option>
        <option value="M">M</option>
        <option value="L">L</option>
      </select>
    </div>
  </div>

  <label for="add-tags">Tags</label>
  <input id="add-tags" type="text" autocomplete="off" placeholder="+tag +tag">

  <div class="actions">
    <button class="primary" id="btn-add">Add task</button>
  </div>
  <div id="status2"></div>
</div>

<!-- ── Bookmark pane ── -->
<div class="pane" id="pane-bookmark">
  <div class="url-preview" id="url-preview">…</div>

  <label for="bm-title">Title</label>
  <input id="bm-title" type="text" autocomplete="off" placeholder="Page title">

  <div class="row">
    <div>
      <label for="bm-project">Project</label>
      <input id="bm-project" type="text" autocomplete="off" placeholder="optional">
    </div>
    <div>
      <label for="bm-tags">Extra tags</label>
      <input id="bm-tags" type="text" autocomplete="off" placeholder="+tag">
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="btn-bookmark">Bookmark</button>
  </div>
  <div id="status"></div>
</div>

<!-- ── tw-web pane ── -->
<div class="pane" id="pane-twweb">
  <div class="tw-status-row">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Checking…</span>
    <button id="btn-stop-start" style="display:none"></button>
  </div>
  <div id="health-info" style="display:none; font-size:11px; color:rgba(255,255,255,0.4); padding:0 2px 10px; line-height:1.8;"></div>
  <div id="stop-confirm">
    <span>Stop Flask server?</span>
    <button id="btn-stop-yes">Stop</button>
    <button id="btn-stop-no">Cancel</button>
  </div>
  <div class="tw-links">
    <button id="btn-open">⬡ Open tw-web</button>
    <a id="gh-link" href="#">⌥ github.com/linuxcaffe/tw-web</a>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
